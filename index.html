<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal & Policies - Finax</title>
    <style>
        :root {
            --bg-color: #FFFFFF;
            --text-main: #000000;
            --text-muted: #666666;
            --border-color: #E5E5E5;
            --hover-bg: #FAFAFA;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-main: #FFFFFF;
                --text-muted: #999999;
                --border-color: #333333;
                --hover-bg: #111111;
            }
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        
        header {
            margin-bottom: 3rem;
            text-align: center;
            margin-top: 4rem;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            display: inline-block;
        }

        h1 {
            font-size: clamp(2rem, 4vw, 2.5rem);
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .container {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .legal-card {
            background-color: transparent;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem 2rem;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .legal-card:hover {
            background-color: var(--hover-bg);
            border-color: var(--text-main);
        }

        .legal-card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .legal-card h2::after {
            content: '→';
            font-size: 1.25rem;
            opacity: 0.5;
            transition: opacity 0.2s ease, transform 0.2s ease;
            transform: translateX(-5px);
        }

        .legal-card:hover h2::after {
            opacity: 1;
            transform: translateX(0);
        }

        .legal-card p {
            color: var(--text-muted);
            line-height: 1.5;
            font-size: 0.95rem;
        }

        footer {
            margin-top: auto;
            padding-top: 4rem;
            padding-bottom: 1rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">Finax</a>
        <h1>Legal & Policies</h1>
    </header>

    <div class="container">
        <a href="/privacy" class="legal-card">
            <h2>Privacy Policy</h2>
            <p>Information on how we collect and protect your data.</p>
        </a>

        <a href="/terms" class="legal-card">
            <h2>Terms of Service</h2>
            <p>Rules and guidelines for using the Finax platform.</p>
        </a>
    </div>

    <footer>
        &copy; 2026 Finax.
    </footer>
</body>
</html>
